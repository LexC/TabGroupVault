<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TabGroupVault</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-width: 240px;
        background: Canvas;
        color: CanvasText;
      }

      main {
        display: grid;
        gap: 12px;
        padding: 16px;
      }

      h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 650;
      }

      button {
        border: 1px solid ButtonBorder;
        border-radius: 6px;
        background: ButtonFace;
        color: ButtonText;
        cursor: pointer;
        font: inherit;
        padding: 9px 12px;
      }

      button:hover {
        filter: brightness(0.96);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>TabGroupVault</h1>
      <button id="openArchive" type="button">Open TabGroupVault</button>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
